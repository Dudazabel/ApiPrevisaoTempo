<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>
    <link rel="stylesheet" href="dist/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
   
</head>
    <body class="bg-[#9dd3fe] font-[Plus_Jakarta_Sans]">
        <header>
                <div class="flex justify-center">
                    <img src="imagens/sunny-day.png" alt="Logo do site" class="pt-8 pr-1 pb-8 pl-6">
                    <h1 class="text-2xl pt-8 pb-8 text-white">Previsão do Tempo </h1>
                </div>
        </header>
        <main>
            <section> 
                <div class="flex justify-center">
                    <div class="flex bg-[#C8E8FF] rounded-xl mr-1 ml-3 pt-3 pr-10 pl-3 pb-3">
                        <div class="mr-3">
                            <img src="imagens/search.png" alt="Ícone da lupa">
                        </div>
                        <div class="text-white">
                            <input id="cidadeInput" type="text" placeholder="Buscar cidade...">
                        </div>
                    </div>
                    <div class="bg-[#66B2FF] rounded-xl mr-3 pt-3 pr-3 pl-3 pb-3 text-white">
                        <button onclick="buscarClima()">Buscar</button>
                    </div>
                </div>
            </section>
            <section>
                <div class="bg-[#C8E8FF] mt-6 mr-3 ml-3 rounded-xl justify-center">
                    <div>
                        <div class="pr-4 pl-2 pt-6 text-white text-xl flex">
                            <div class="pr-1">
                                <p>Santa Catarina,</p>
                            </div>
                            <div>
                                <p>Jaraguá do Sul</p>
                            </div>
                        </div>
                        <div class="text-[#F8F9FA] text-[16px] flex pl-2">
                            <div class="diaSemana">
                                <p>Segunda-Feira,</p>
                            </div>
                            <div class="flex">
                                <div class="diaNumero">
                                    <p>09 De</p>
                                </div>
                                <div class="mesExtenso">
                                    <p>Fevereiro</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="comoEstaDia">
                        <div class="primeiraParte">
                            <div class="comoEstaCeu">
                                <p>Imagem de Nuvem como está o céu</p>
                            </div>
                            <div class="temperatura">
                                <p id="tempAtual">-</p>
                            </div>
                        </div>
                        <div class="segundaParte">
                            <div class="comoEstaCeuEscrito">
                                <p>Como o céu está por escrito</p>
                            </div>
                            <div class="informacoesAdicionais">
                                <div class="velocidadeVentos">
                                    <img src="" alt="Vento">
                                    <p>Velocidade que o vento está</p>
                                </div>
                                <div class="precipitacao">
                                    <img src="" alt="Gotas de água">
                                    <p>Quantidade de chuva por regiao</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="finalzinhoPagina">
                    <div class="fraseSobreDia">
                        <p>Frase de ideia do que fazer no dia</p>
                    </div>
                </div>
                <div class="finalPagina">
                    <div class="titulo">
                        <p>Próximos dias</p>
                    </div>
                    <div class="proximosDias">
                        <div class="primeiroDia">
                            <div class="informacoesDiaUm">
                                <div class="diaDaSemana"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
